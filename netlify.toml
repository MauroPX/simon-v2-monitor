# netlify.toml
# Configuración de deploy para simon-v2-monitor
# ADR-004 — Netlify Functions como proxy CORS para Traccar API

[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NEXT_TELEMETRY_DISABLED = "1"

# Plugin oficial Next.js para Netlify
[[plugins]]
  package = "@netlify/plugin-nextjs"

# ============================================================
# FUNCTIONS — Proxy CORS para Traccar
# ============================================================
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# ============================================================
# REDIRECTS — API proxy
# ============================================================
# Todas las llamadas a /api/traccar/* van al proxy function
[[redirects]]
  from = "/api/traccar/*"
  to = "/.netlify/functions/traccar"
  status = 200

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  conditions = {Role = ["admin"]}

# ============================================================
# HEADERS DE SEGURIDAD — WCAG + SecOps
# ============================================================
[[headers]]
  for = "/*"
  [headers.values]
    # SecOps — headers obligatorios (ADR-001 SecOps M0)
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    # CSP permisiva para Leaflet tiles + OpenStreetMap
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-eval' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://*.tile.openstreetmap.org https://unpkg.com; connect-src 'self' https://demo4.traccar.org; font-src 'self' data:;"

# Cache largo para assets estáticos
[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ============================================================
# CONTEXTOS DE DEPLOY
# ============================================================
[context.production]
  command = "npm run build"

[context.deploy-preview]
  command = "npm run build"

[context.branch-deploy]
  command = "npm run build"

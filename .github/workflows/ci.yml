# .github/workflows/ci.yml
# Pipeline CI/CD — simon-v2-monitor
# ADR-005 — corre en cada PR hacia develop y main
# Jobs: lint → type-check → test → a11y → build

name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  # ============================================================
  # JOB 1 — Lint (ESLint + Prettier)
  # ============================================================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Prettier check
        run: npm run format:check

  # ============================================================
  # JOB 2 — TypeScript type check
  # ============================================================
  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - name: TypeScript
        run: npm run type-check

  # ============================================================
  # JOB 3 — Tests (jest + jest-axe)
  # ============================================================
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - name: Run tests with coverage
        run: npm run test:ci
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/

  # ============================================================
  # JOB 4 — Accesibilidad (axe-core via jest-axe)
  # Bloquea el PR si hay violaciones WCAG críticas
  # ============================================================
  a11y:
    name: Accessibility (WCAG 2.1 AA)
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - name: jest-axe audit
        run: npm run test:a11y
      - name: Upload axe report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: axe-report
          path: test-results/a11y/

  # ============================================================
  # JOB 5 — Build check (verifica que el build no rompe)
  # ============================================================
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, type-check, test, a11y]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - name: Build Next.js
        run: npm run build
        env:
          NEXT_PUBLIC_USE_MOCK: 'false'
          NEXT_PUBLIC_TRACCAR_BASE: 'https://demo4.traccar.org'
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: .next/
          retention-days: 1

  # ============================================================
  # JOB 6 — Resumen del PR
  # ============================================================
  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [lint, type-check, test, a11y, build]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.type-check.result }}" != "success" ] || \
             [ "${{ needs.test.result }}" != "success" ] || \
             [ "${{ needs.a11y.result }}" != "success" ] || \
             [ "${{ needs.build.result }}" != "success" ]; then
            echo "❌ CI FAILED — uno o más jobs fallaron"
            echo "Lint: ${{ needs.lint.result }}"
            echo "Type-check: ${{ needs.type-check.result }}"
            echo "Tests: ${{ needs.test.result }}"
            echo "A11y: ${{ needs.a11y.result }}"
            echo "Build: ${{ needs.build.result }}"
            exit 1
          fi
          echo "✅ CI PASSED — todos los jobs superados"
